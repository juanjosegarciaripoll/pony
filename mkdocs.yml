site_name: Pony Express
site_description: Terminal-first mail user agent in Python
site_url: https://juanjosegarciaripoll.github.io/pony/
repo_url: https://github.com/juanjosegarciaripoll/pony
repo_name: juanjosegarciaripoll/pony

theme:
  name: material
  logo: assets/pony-express.png
  favicon: assets/pony-express.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Configuration: configuration.md
  - CLI Reference: cli.md
  - Terminal UI: tui.md
  - Composer: composer.md
  - Contacts: contacts.md
  - Synchronization: synchronization.md
  - Architecture: architecture.md
  - MCP Server: mcp-server.md
  - Development: development.md

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.keys
  - attr_list
  - toc:
      permalink: true
