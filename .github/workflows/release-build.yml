name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'
  release:
    types:
      - published

env:
  APP_NAME: pony
  PYTHON_VERSION: '3.13'

jobs:
  validate-tag:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Extract tag from event
        id: tag
        run: |
          python - <<'PY'
          import json
          import os
          tag = ""
          event_name = os.getenv("GITHUB_EVENT_NAME", "")
          if event_name == "release":
              event_path = os.getenv("GITHUB_EVENT_PATH", "")
              if event_path:
                  with open(event_path, "r", encoding="utf-8") as f:
                      payload = json.load(f)
                  tag = payload.get("release", {}).get("tag_name", "") or ""
          if not tag:
              ref = os.getenv("GITHUB_REF", "")
              if ref.startswith("refs/tags/"):
                  tag = ref[len("refs/tags/") :]
          if not tag:
              raise SystemExit("Unable to determine release tag from GitHub event.")
          print(f"tag={tag}")
          with open(os.environ['GITHUB_OUTPUT'], "a", encoding="utf-8") as out:
              out.write(f"tag={tag}\n")
          PY
        shell: bash

      - name: Validate semver tag
        run: |
          if [[ ! "${{ steps.tag.outputs.tag }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag '${{ steps.tag.outputs.tag }}' is not a valid semver tag."
            echo "Use tags like v0.1.0, v1.2.3, etc."
            exit 1
          fi
          echo "Validated tag: ${{ steps.tag.outputs.tag }}"
        shell: bash

  build:
    name: Build and package
    needs: validate-tag
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: macos
          - os: windows-latest
            platform: windows
    env:
      TAG: ${{ needs.validate-tag.outputs.tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv and Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --group dev --group build --group docs
        shell: bash

      - name: Run tests
        run: uv run python -m pytest
        shell: bash

      - name: Build documentation
        run: uv run mkdocs build --strict
        shell: bash

      - name: Install Inno Setup (Windows)
        if: matrix.platform == 'windows'
        run: choco install innosetup --yes
        shell: bash

      - name: Build binary and installers
        run: uv run python scripts/build.py --skip-tests --skip-docs --installer
        shell: bash

      - name: List artifacts
        run: ls artifacts/
        shell: bash

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ matrix.platform }}-${{ env.TAG }}
          path: artifacts/

      - name: Upload release assets
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for f in artifacts/*; do
            if [ -f "$f" ]; then
              gh release upload "${{ env.TAG }}" "$f" --clobber
            fi
          done
        shell: bash
